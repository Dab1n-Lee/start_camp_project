<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Pianist & Software Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-transition grid-bg min-h-screen flex flex-col justify-between">
    <header class="fixed top-0 left-0 w-full z-40 backdrop-blur-md bg-opacity-75 border-b border-zinc-900" style="background-color: rgba(11, 11, 13, 0.8);">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2 tracking-widest text-sm font-semibold text-zinc-100">
                <span class="text-[var(--color-accent-piano)]">🎹</span>
                <span class="font-light">pyanist</span>
            </a>

            <nav class="hidden md:flex items-center space-x-10">
                <a href="index.html" data-page="home" class="nav-link text-xs tracking-widest text-zinc-400 hover:text-zinc-200 uppercase">Home</a>
                <a href="bio.html" data-page="bio" class="nav-link text-xs tracking-widest text-zinc-400 hover:text-zinc-200 uppercase">Bio</a>
                <a href="concert.html" data-page="concert" class="nav-link text-xs tracking-widest text-zinc-400 hover:text-zinc-200 uppercase">Concert</a>
                <a href="game.html" data-page="game" class="nav-link text-xs tracking-widest text-zinc-400 hover:text-zinc-200 uppercase">Game</a>
                <a href="contact.html" data-page="contact" class="nav-link text-xs tracking-widest text-zinc-400 hover:text-zinc-200 uppercase">Contact</a>
            </nav>

            <button class="md:hidden text-zinc-400 hover:text-white" id="menu-toggle">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="hidden md:hidden w-full bg-[#121215] border-b border-zinc-900 px-6 py-6 space-y-4" id="mobile-drawer">
            <a href="index.html" data-page="home" class="mobile-link block text-xs tracking-widest text-zinc-400 hover:text-zinc-200 uppercase">Home</a>
            <a href="bio.html" data-page="bio" class="mobile-link block text-xs tracking-widest text-zinc-400 hover:text-zinc-200 uppercase">Bio</a>
            <a href="concert.html" data-page="concert" class="mobile-link block text-xs tracking-widest text-zinc-400 hover:text-zinc-200 uppercase">Concert</a>
            <a href="game.html" data-page="game" class="mobile-link block text-xs tracking-widest text-zinc-400 hover:text-zinc-200 uppercase">Game</a>
            <a href="contact.html" data-page="contact" class="mobile-link block text-xs tracking-widest text-zinc-400 hover:text-zinc-200 uppercase">Contact</a>
        </div>
    </header>

    <main class="flex-grow pt-24 px-6 py-20">
        <section class="max-w-2xl mx-auto">
            <div class="text-center mb-10 space-y-3">
                <span class="text-[10px] tracking-[0.3em] text-[var(--color-accent-piano)] uppercase font-semibold">Contact</span>
                <h1 class="text-3xl md:text-4xl font-light text-zinc-100 tracking-tight">Contact</h1>
                <p class="text-zinc-400 text-sm md:text-base leading-relaxed">연주, 교류, 개발, 밥약 뭐든 환영합니다. 편안하게 연락주세요.</p>
            </div>

            <div class="space-y-4 pt-4 text-zinc-400 text-center">
                <div>
                    <i data-lucide="mail" class="w-4 h-4 text-[var(--color-accent-piano)] inline-block mr-2"></i>
                    <span class="text-xs">pyanist@gmail.com</span>
                </div>
                <div>
                    <i data-lucide="map-pin" class="w-4 h-4 text-[var(--color-accent-tech)] inline-block mr-2"></i>
                    <span class="text-xs">Seoul, South Korea</span>
                </div>
            </div>

            <form id="contact-form" class="mt-8 space-y-4 bg-zinc-900/40 p-6 rounded-xl border border-zinc-850">
                <div class="space-y-1 text-left">
                    <label class="text-[10px] uppercase tracking-wider text-zinc-500">이름</label>
                    <input type="text" required class="w-full bg-zinc-950 border border-zinc-850 focus:border-[var(--color-accent-piano)] rounded px-3 py-2 text-xs text-zinc-200 outline-none transition-all">
                </div>
                <div class="space-y-1 text-left">
                    <label class="text-[10px] uppercase tracking-wider text-zinc-500">이메일</label>
                    <input type="email" required class="w-full bg-zinc-950 border border-zinc-850 focus:border-[var(--color-accent-piano)] rounded px-3 py-2 text-xs text-zinc-200 outline-none transition-all">
                </div>
                <div class="space-y-1 text-left">
                    <label class="text-[10px] uppercase tracking-wider text-zinc-500">내용</label>
                    <textarea rows="3" required class="w-full bg-zinc-950 border border-zinc-850 focus:border-[var(--color-accent-piano)] rounded px-3 py-2 text-xs text-zinc-200 outline-none transition-all"></textarea>
                </div>
                <button type="submit" class="w-full py-2.5 bg-zinc-100 hover:bg-white text-black font-semibold text-xs tracking-wider uppercase rounded transition-all">
                    보내기
                </button>
            </form>
        </section>
    </main>

    <footer class="bg-black py-8 border-t border-zinc-950 px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left">
            <span class="text-[10px] text-zinc-600 tracking-wider">&copy; 2026 Pianist & Software Engineer Portfolio.</span>
            <div class="flex space-x-6">
                <a href="#" class="text-zinc-600 hover:text-[var(--color-accent-piano)] transition-colors"><i data-lucide="youtube" class="w-4 h-4"></i></a>
                <a href="#" class="text-zinc-600 hover:text-[var(--color-accent-piano)] transition-colors"><i data-lucide="mail" class="w-4 h-4"></i></a>
            </div>
        </div>
    </footer>

    <div id="notif-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300 px-4">
        <div class="bg-[#121215] border border-zinc-850 rounded-xl max-w-sm w-full p-6 text-center space-y-4">
            <div class="w-12 h-12 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto">
                <i data-lucide="check" class="w-6 h-6"></i>
            </div>
            <h3 class="text-base font-medium text-zinc-100">메시지가 정상적으로 발송되었습니다</h3>
            <p class="text-xs text-zinc-500 leading-relaxed">소중한 문의 감사합니다. 신속하게 연락드리겠습니다.</p>
            <button onclick="closeNotifModal()" class="w-full py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 text-xs tracking-wider rounded transition-all">
                확인
            </button>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
